name: Build Miliza OS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to upload the release
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Generate Timestamp
        id: time
        # Pure numbers: YYYYMMDDHHMM (e.g., 202605162137)
        run: echo "TIMESTAMP=$(date +'%Y%m%d%H%M')" >> $GITHUB_ENV

      - name: Build Raspberry Pi Image (ARM64)
        id: build_image 
        uses: pguyot/arm-runner-action@v2
        with:
          base_image: raspios_lite_arm64:latest
          bind_mount_repository: true
          image_additional_mb: 6000
          commands: |
            export MILIZA_AARCH64_URL="${{ secrets.MILIZA_AARCH64_URL }}"
            chmod +x ./miliza_pios_build.sh
            ./miliza_pios_build.sh

      - name: Compress the Image
        run: |
          # Moves and names it: miliza_pios_aarch64_202605162137.img
          mv "${{ steps.build_image.outputs.image }}" "miliza_pios_aarch64_${{ env.TIMESTAMP }}.img"
          
          # Zips it: miliza_pios_aarch64_202605162137.img.gz
          gzip -9 "miliza_pios_aarch64_${{ env.TIMESTAMP }}.img"

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v1
        with:
          tag_name: miliza_pios_build-${{ env.TIMESTAMP }}
          name: Miliza OS (Build ${{ env.TIMESTAMP }})
          # Exactly matches the zipped file
          files: miliza_pios_aarch64_${{ env.TIMESTAMP }}.img.gz
          draft: false
          prerelease: false